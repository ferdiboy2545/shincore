<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHINCORE TOP UP</title>

<!-- FONT VIP -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#05070f;
color:#FFD700;
overflow-x:hidden;
}

/* ===== BACKGROUND VIP ===== */

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, #FFD70022, transparent 35%),
radial-gradient(circle at 80% 80%, #8B750022, transparent 35%);
animation:bgmove 10s infinite alternate;
z-index:-3;
}

@keyframes bgmove{
0%{transform:scale(1);}
100%{transform:scale(1.08);}
}

/* ===== DIAMOND ===== */

.diamond{
position:fixed;
top:-50px;
width:18px;
opacity:0.8;
z-index:-1;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10vh) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(360deg);
}
}

/* ===== NAVBAR ===== */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(15px);
border-bottom:1px solid #3a2d00;
z-index:999;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:38px;
height:38px;
}

.logo span{
font-size:20px;
font-weight:700;
letter-spacing:2px;
color:#FFD700;
text-shadow:0 0 10px #FFD70055;
}

.menu{
display:flex;
gap:20px;
}

.menu a{
text-decoration:none;
color:#FFD700;
transition:0.3s;
font-size:15px;
}

.menu a:hover{
color:white;
text-shadow:0 0 10px #FFD700;
}

/* ===== HAMBURGER ===== */

.hamburger{
display:none;
font-size:28px;
cursor:pointer;
transition:0.3s;
}

.hamburger.active{
transform:rotate(90deg);
}

/* ===== SLIDER ===== */

.slider{
margin-top:100px;
display:flex;
justify-content:center;
}

.slider-box{
width:80%;
max-width:700px;
overflow:hidden;
border-radius:18px;
border:1px solid #3a2d00;
box-shadow:0 0 20px #FFD70033;
}

.slides{
display:flex;
transition:transform 1s ease-in-out;
}

.slides img{
min-width:100%;
height:240px;
object-fit:cover;
}

/* ===== TITLE ===== */

.section-title{
text-align:center;
margin:25px 0;
font-size:24px;
color:#FFD700;
text-shadow:0 0 10px #FFD70055;
}

/* ===== GRID GAME ===== */

.grid{
max-width:900px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
gap:15px;
padding:20px;
}

.card{
background:rgba(255,215,0,0.05);
border:1px solid rgba(255,215,0,0.1);
border-radius:12px;
padding:10px;
text-align:center;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 15px #FFD70055;
}

.card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:10px;
margin-bottom:8px;
}

.card p{
font-size:13px;
font-weight:600;
}

/* ===== FOOTER ===== */

footer{
margin-top:40px;
padding:25px;
text-align:center;
border-top:1px solid #3a2d00;
}

.social{
display:flex;
justify-content:center;
gap:18px;
margin-bottom:12px;
}

.social a{
width:45px;
height:45px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,215,0,0.05);
border:1px solid rgba(255,215,0,0.15);
transition:0.3s;
font-size:22px;
color:#FFD700;
text-decoration:none;
}

.social a:hover{
transform:translateY(-4px) scale(1.08);
background:#FFD700;
color:black;
box-shadow:0 0 15px #FFD70066;
}

/* ===== RESPONSIVE ===== */

@media(max-width:768px){

.menu{
position:absolute;
top:70px;
right:15px;
flex-direction:column;
background:#0b0f18;
padding:15px;
border-radius:12px;
border:1px solid #3a2d00;
display:none;
}

.menu.show{
display:flex;
}

.hamburger{
display:block;
}

.slider-box{
width:92%;
}

.slides img{
height:200px;
}

}



</style>
</head>

<!-- SLIDER JS -->

<script>

let index=0;

const slides=document.getElementById("slides");

const total=slides.children.length;

setInterval(()=>{

index++;

if(index>=total){
index=0;
}

slides.style.transform=`translateX(-${index*100}%)`;

},4000);

/* HAMBURGER */

function toggleMenu(){

const menu=document.getElementById("menu");

const burger=document.getElementById("hamburger");

menu.classList.toggle("show");

burger.classList.toggle("active");

function pilihGame(game){

</script>
