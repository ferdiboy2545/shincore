========================= */

class Game {

constructor(

/* =========================

========================= */

const params = new URLSearchParams(window.location.search);

const selectedGame = params.get("game");

const game = games[selectedGame];

   RENDER GAME
========================= */

document.getElementById("gameTitle").innerHTML =
game.nama;

document.getElementById("gameImage").src =
game.gambar;

document.getElementById("gameDescription").innerHTML =
game.deskripsi;

document.getElementById("inputLabel").innerHTML =

/* =========================
   RENDER DIAMOND
========================= */

const diamondGrid =
document.getElementById("diamondGrid");

const totalHarga =
document.getElementById("totalHarga");

let selectedPrice = 0;

game.getDiamond().forEach(item => {

const div = document.createElement("div");

div.classList.add("diamond-item");

div.innerHTML = `

<h3>${item.diamond}</h3>

<p class="price">
Rp ${item.harga.toLocaleString()}
</p>

`;

div.addEventListener("click", () => {

document.querySelectorAll(".diamond-item")
.forEach(el => {

el.classList.remove("active");

});

div.classList.add("active");

selectedPrice = item.harga;

totalHarga.innerHTML =
`Rp ${selectedPrice.toLocaleString()}`;

});

diamondGrid.appendChild(div);

});

}
